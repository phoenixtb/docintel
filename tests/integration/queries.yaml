# DocIntel Integration Test Queries
# ------------------------------------
# Each suite maps to a dataset domain.
#
# Fields per query:
#   expect_keywords    — soft keyword check; keywords checked in answer + source text
#   expect_abstention  — true when the corpus should NOT contain an answer (abstention-correct metric)
#   relevant_docs      — list of filename substrings expected in retrieved sources (retrieval metrics)
#   ground_truth       — reference answer text (used by LLM judge for faithfulness/relevancy)
#
# Retrieval and generation metrics require --metrics flag in run_tests.py.

config:
  base_url: "http://localhost:8080"   # api-gateway; swap to :8000 for direct rag-service
  rag_path: "/api/v1/query/stream"
  tenant_id: "e2e"
  use_reranking: true
  use_cache: false
  timeout_seconds: 180
  # Minimum answer length to pass. Factual answers can be short and correct —
  # set low; use expect_keywords for quality signal instead.
  min_answer_length: 5

  # Reranker health check (checked in pre-flight when use_reranking is true).
  reranker_url: "http://localhost:11430/v1"
  reranker_model: "jina-reranker-v2:multilingual"

  # LLM judge for --metrics mode (uses LMForge qwen3.5 by default).
  judge_url: "http://localhost:11430/v1"
  judge_model: "qwen3.5:4b:6bit"

  # Auth via JWT Bearer grant (RFC 7523) — industry standard for CI / automated tests.
  # run_tests.py loads the E2E SA private key from config/zitadel/e2e-sa-key.json
  # (auto-generated by Terraform, written by start.sh, git-ignored).
  # Override key path via E2E_SA_KEY_FILE env var.
  # Pass --no-auth to disable entirely (only works if gateway security is off).
  auth:
    token_url: "http://localhost:9095/oauth/v2/token"
    scopes: "openid email profile"

suites:

  - name: "HR Policies"
    document_type: "hr_policy"
    queries:
      # No WFH policy exists in the Kreeda Labs HR dataset — correct answer is abstention.
      - question: "What is the work from home policy?"
        expect_keywords: ["policy"]
        expect_abstention: true
        relevant_docs: []
        ground_truth: "There is no work from home policy in the available documents."

      - question: "How many days of annual leave am I entitled to?"
        expect_keywords: ["leave", "days"]
        expect_abstention: false
        relevant_docs: ["hr_policy"]

      - question: "What is the process for requesting parental leave?"
        expect_keywords: ["parental", "leave", "request"]
        expect_abstention: false
        relevant_docs: ["hr_policy"]

      - question: "How is employee performance evaluated during the probation period?"
        expect_keywords: ["performance", "probation"]
        expect_abstention: false
        relevant_docs: ["hr_policy"]

      - question: "What are the consequences of not complying with the code of conduct?"
        expect_keywords: ["conduct", "disciplin"]
        expect_abstention: false
        relevant_docs: ["hr_policy"]

      - question: "What should I do if I experience workplace harassment?"
        expect_keywords: ["harassment", "report"]
        expect_abstention: false
        relevant_docs: ["hr_policy"]

      - question: "How do I submit a complaint or grievance?"
        expect_keywords: ["complaint", "grievance"]
        expect_abstention: false
        relevant_docs: ["hr_policy"]

      # Work-life balance IS covered — should answer, not abstain.
      - question: "What is Kreeda Labs' work-life balance policy?"
        expect_keywords: ["work-life", "balance"]
        expect_abstention: false
        relevant_docs: ["hr_policy"]
        ground_truth: "Kreeda Labs encourages employees to manage tasks within regular working hours to promote work-life balance and prevent burnout."

  - name: "Technical"
    # Source: m-ric/huggingface_doc — HuggingFace library documentation
    # (Transformers, Datasets, Gradio, Hub, Evaluate, etc.)
    document_type: "technical"
    queries:
      - question: "How do I load a dataset using the HuggingFace datasets library?"
        expect_keywords: ["load_dataset", "dataset", "split"]
        expect_abstention: false
        relevant_docs: ["technical"]

      - question: "How do I fine-tune a pre-trained transformer model?"
        expect_keywords: ["fine-tune", "train", "model"]
        expect_abstention: false
        relevant_docs: ["technical"]

      - question: "How do I create a Gradio demo for my machine learning model?"
        expect_keywords: ["gradio", "interface", "demo"]
        expect_abstention: false
        relevant_docs: ["technical"]

      - question: "How do I push a model to the HuggingFace Hub?"
        expect_keywords: ["push", "hub", "repository"]
        expect_abstention: false
        relevant_docs: ["technical"]

      - question: "What is the difference between AutoModel and pipeline in Transformers?"
        expect_keywords: ["pipeline", "AutoModel", "model"]
        expect_abstention: false
        relevant_docs: ["technical"]

      - question: "How do I evaluate a model using the evaluate library?"
        expect_keywords: ["evaluate", "metric", "score"]
        expect_abstention: false
        relevant_docs: ["technical"]

  - name: "Contracts"
    document_type: "contracts"
    queries:
      - question: "What are the termination clauses in these contracts?"
        expect_keywords: ["terminat", "clause", "notice"]
        expect_abstention: false
        relevant_docs: ["contracts"]

      - question: "Who owns intellectual property developed under this agreement?"
        expect_keywords: ["intellectual property", "owner", "agreement"]
        expect_abstention: false
        relevant_docs: ["contracts"]

      - question: "What is the limitation of liability in this contract?"
        expect_keywords: ["liabilit", "limit", "damages"]
        expect_abstention: false
        relevant_docs: ["contracts"]

      - question: "Does this agreement include a non-compete or non-solicitation clause?"
        expect_keywords: ["non-compete", "non-solicitation", "restric"]
        expect_abstention: false
        relevant_docs: ["contracts"]

      - question: "What are the indemnification obligations of each party?"
        expect_keywords: ["indemnif", "obligation", "party"]
        expect_abstention: false
        relevant_docs: ["contracts"]

      - question: "What are the payment terms and conditions?"
        expect_keywords: ["payment", "terms", "due"]
        expect_abstention: false
        relevant_docs: ["contracts"]

      - question: "Under what circumstances can the contract be renewed or extended?"
        expect_keywords: ["renew", "extend", "term"]
        expect_abstention: false
        relevant_docs: ["contracts"]

  # ---------------------------------------------------------------------------
  # Min Score Strict
  # T11: when no documents pass rag_min_relevance_score and fallback_topk=0
  # the service must return the no-relevant-documents sentinel rather than a
  # hallucinated answer.
  # To run: set RAG_MIN_RELEVANCE_SCORE=0.99 and RAG_MIN_SCORE_FALLBACK_TOPK=0
  # in the rag-service environment before running this suite.
  # ---------------------------------------------------------------------------
  - name: "Min Score Strict"
    skip_if_env_missing: ["ENABLE_MIN_SCORE_SUITE"]
    queries:
      - question: "Highly implausible query that will never match anything in the corpus xyzzy123"
        expect_no_sources: true
        expect_abstention: true
        relevant_docs: []
        expect_keywords: ["not find", "relevant", "no relevant"]

  # ---------------------------------------------------------------------------
  # Thinking Mode
  # T6b/T5: when thinking mode is enabled the API must return a non-empty
  # `thinking` field alongside the answer (the thinking tokens must not be
  # dropped or leaked into the answer body).
  # To run: set LLM_THINKING_MODE=true or send thinking=true in the request.
  # ---------------------------------------------------------------------------
  - name: "Thinking Mode"
    skip_if_env_missing: ["ENABLE_THINKING_SUITE"]
    config_overrides:
      thinking: true
    queries:
      - question: "What are the key principles of a good employee code of conduct?"
        expect_keywords: ["conduct", "employee", "principle"]
        expect_thinking_length_min: 10
        expect_abstention: false
        relevant_docs: ["hr_policy"]

      - question: "What termination conditions apply to standard vendor contracts?"
        expect_keywords: ["terminat", "contract", "vendor"]
        expect_thinking_length_min: 10
        expect_abstention: false
        relevant_docs: ["contracts"]

  # ---------------------------------------------------------------------------
  # Cache Hit
  # Verifies that the second identical request is served from the semantic cache
  # (cache_hit: true in the metadata event) and contains the same answer tokens.
  # run_tests.py fires each query twice and checks the second response.
  # ---------------------------------------------------------------------------
  - name: "Cache Hit"
    skip_if_env_missing: ["ENABLE_CACHE_SUITE"]
    config_overrides:
      use_cache: true
    queries:
      - question: "What is the work from home policy?"
        expect_cache_hit: true
        expect_keywords: ["policy"]
        expect_abstention: true

  # ---------------------------------------------------------------------------
  # OPA Denied (Streaming security gap regression)
  # Proves that the streaming path now enforces OPA — previously the streaming
  # handler skipped OpaChunkValidator entirely (security gap closed by A6).
  #
  # The test user "e2e" must NOT have clearance for "secret" classification.
  # Documents ingested with classification=secret should be denied.
  #
  # To run: set ENABLE_OPA_DENIED_SUITE=1 and ensure at least one document
  # with classification=secret exists in the tenant corpus.
  # The suite uses /query/stream to specifically prove the streaming path.
  # ---------------------------------------------------------------------------
  - name: "OPA Denied"
    skip_if_env_missing: ["ENABLE_OPA_DENIED_SUITE"]
    config_overrides:
      rag_path: "/api/v1/query/stream"
    queries:
      - question: "What is in the classified documents?"
        expect_opa_denied: true
        expect_no_sources: true
        expect_abstention: true
        expect_keywords: ["not find", "relevant", "no relevant"]

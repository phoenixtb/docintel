# DocIntel CI Pipeline
# ====================
# Runs on push to main and all PRs

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # RAG Service (Python)
  # ===========================================================================
  rag-service:
    name: RAG Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rag-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: |
          ruff check src/
          ruff format --check src/

      - name: Type check with MyPy
        run: |
          mypy src/ --ignore-missing-imports

      - name: Run tests
        run: |
          pytest tests/ -v

  # ===========================================================================
  # Analytics Service (Python)
  # ===========================================================================
  analytics-service:
    name: Analytics Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analytics-service-py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  # ===========================================================================
  # Kotlin Services
  # ===========================================================================
  kotlin-services:
    name: Kotlin Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, document-service, admin-service]

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build -x test

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-${{ matrix.service }}
          path: services/${{ matrix.service }}/build/reports/jacoco/

  # ===========================================================================
  # Web UI
  # ===========================================================================
  web-ui:
    name: Web UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web-ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: services/web-ui/package.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --reporter=github
        env:
          CI: true
          PUBLIC_API_URL: http://localhost:8080
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: services/web-ui/playwright-report/

  # ===========================================================================
  # Docker Build Test — all services
  # ===========================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rag-service, analytics-service, kotlin-services, web-ui]
    strategy:
      matrix:
        include:
          - service: rag-service
            context: services/rag-service
            tag: docintel/rag-service:ci
          - service: analytics-service-py
            context: services/analytics-service-py
            tag: docintel/analytics-service:ci
          - service: api-gateway
            context: services/api-gateway
            tag: docintel/api-gateway:ci
          - service: admin-service
            context: services/admin-service
            tag: docintel/admin-service:ci
          - service: document-service
            context: services/document-service
            tag: docintel/document-service:ci
          - service: web-ui
            context: services/web-ui
            tag: docintel/web-ui:ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

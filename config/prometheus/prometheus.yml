global:
  scrape_interval: 15s          # How often to scrape targets
  scrape_timeout: 10s           # Max wait for a scrape response
  evaluation_interval: 15s      # How often to evaluate alert rules
  external_labels:
    environment: docintel

# ============================================================================
# Alert rules
# ============================================================================
rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers: []

# ============================================================================
# Scrape targets
# ============================================================================
scrape_configs:

  # --------------------------------------------------------------------------
  # Prometheus self-monitoring
  # --------------------------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # --------------------------------------------------------------------------
  # DocIntel Application Services
  # --------------------------------------------------------------------------

  # FastAPI — prometheus-fastapi-instrumentator auto-instruments all routes.
  # Custom metrics: rag_query_latency_seconds, rag_cache_hit_total,
  #                 rag_cache_miss_total, rag_llm_queue_waiting, rag_indexing_chunks_total
  - job_name: rag-service
    metrics_path: /metrics
    static_configs:
      - targets: ["rag-service:8000"]
        labels:
          service: rag-service
          layer: application

  # FastAPI — analytics ingestion service
  - job_name: analytics-service
    metrics_path: /metrics
    static_configs:
      - targets: ["analytics-service:8001"]
        labels:
          service: analytics-service
          layer: application

  # Spring Boot — micrometer-registry-prometheus exposes JVM + HTTP metrics
  # Endpoint enabled via: management.endpoints.web.exposure.include=prometheus,health
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]
        labels:
          service: api-gateway
          layer: application

  - job_name: admin-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["admin-service:8082"]
        labels:
          service: admin-service
          layer: application

  - job_name: document-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["document-service:8081"]
        labels:
          service: document-service
          layer: application

  # --------------------------------------------------------------------------
  # Infrastructure — native Prometheus endpoints
  # --------------------------------------------------------------------------

  # Qdrant has a built-in /metrics endpoint on the same REST port (6333).
  # Key metrics: qdrant_collections_total, qdrant_points_count, REST latency.
  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]
        labels:
          service: qdrant
          layer: infrastructure

  # OPA exposes Prometheus metrics at /metrics (decisions, errors, latency).
  - job_name: opa
    metrics_path: /metrics
    static_configs:
      - targets: ["opa:8181"]
        labels:
          service: opa
          layer: infrastructure

  # --------------------------------------------------------------------------
  # Infrastructure — sidecar exporters
  # --------------------------------------------------------------------------

  # redis-exporter translates Redis INFO output to Prometheus metrics.
  # Key metrics: redis_connected_clients, redis_used_memory_bytes,
  #              redis_keyspace_hits_total, redis_keyspace_misses_total.
  - job_name: redis
    metrics_path: /metrics
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis
          layer: infrastructure

  # postgres-exporter connects to PostgreSQL and exposes pg_stat_* metrics.
  # Key metrics: pg_up, pg_stat_activity_count, pg_stat_database_blks_hit,
  #              pg_stat_database_tup_inserted/updated/deleted.
  - job_name: postgres
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres
          layer: infrastructure

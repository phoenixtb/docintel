groups:
  - name: docintel.rag
    rules:
      - alert: RagHighErrorRate
        expr: |
          rate(http_requests_total{job="rag-service",status=~"5.."}[5m])
          / rate(http_requests_total{job="rag-service"}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "RAG service error rate > 5% for 2m"

      - alert: RagHighLatency
        expr: |
          histogram_quantile(0.99, rate(rag_query_latency_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAG p99 query latency > 30s"

      - alert: RagLLMQueueFull
        expr: rag_llm_queue_waiting > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "More than 5 LLM requests queued — consider increasing LLM_CONCURRENCY_LIMIT"

  - name: docintel.services
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"

      - alert: GatewayHighErrorRate
        expr: |
          rate(http_requests_total{job="api-gateway",status=~"5.."}[5m])
          / rate(http_requests_total{job="api-gateway"}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "API Gateway error rate > 5%"

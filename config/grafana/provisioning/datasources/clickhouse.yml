apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse-docintel
    isDefault: false
    jsonData:
      host: clickhouse
      port: 9000
      username: ${CLICKHOUSE_USER:-clickhouse}
      defaultDatabase: docintel_analytics
      tlsSkipVerify: true
      protocol: native
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD:-clickhouse}

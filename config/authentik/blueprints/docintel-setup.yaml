# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
# ==============================================================================
# DocIntel Authentik Blueprint
# ==============================================================================
# Auto-provisions complete OAuth2/OIDC setup for DocIntel.
# Loaded automatically by Authentik from /blueprints/custom/ on startup.
#
# Creates:
#   - Scope mappings: tenant_id, role claims
#   - OAuth2/OIDC Provider
#   - DocIntel Application
#   - Groups: platform-admin, alpha-tenant-admin, alpha-tenant, beta-tenant-admin, beta-tenant
#   - Users: diadmin (platform admin), alphaadmin, alphauser, betaadmin, betauser
#   - Branding (title, logo, favicon)
#   - Combined username+password login page
#
# Ref: https://docs.goauthentik.io/customize/blueprints/v1/
# ==============================================================================

version: 1
metadata:
  name: DocIntel Setup
  labels:
    blueprints.goauthentik.io/description: "DocIntel OAuth2 setup with branding and users"

entries:
  # ============================================================================
  # 1. Scope Mapping: tenant_id claim
  # ============================================================================
  - model: authentik_providers_oauth2.scopemapping
    id: tenant-scope-mapping
    identifiers:
      managed: goauthentik.io/providers/oauth2/scope-tenant
    attrs:
      name: "DocIntel Tenant Scope"
      scope_name: tenant
      description: "Includes tenant_id from user's group attributes"
      expression: |
        return {
            "tenant_id": request.user.group_attributes().get("tenant_id", "default")
        }

  # ============================================================================
  # 1b. Scope Mapping: role claim
  # ============================================================================
  - model: authentik_providers_oauth2.scopemapping
    id: role-scope-mapping
    identifiers:
      managed: goauthentik.io/providers/oauth2/scope-role
    attrs:
      name: "DocIntel Role Scope"
      scope_name: role
      description: "Includes role from user's group attributes (platform_admin, tenant_admin, tenant_user)"
      expression: |
        return {
            "role": request.user.group_attributes().get("role", "tenant_user")
        }

  # ============================================================================
  # 2. OAuth2/OIDC Provider
  # ============================================================================
  - model: authentik_providers_oauth2.oauth2provider
    id: docintel-provider
    identifiers:
      name: DocIntel Provider
    attrs:
      name: DocIntel Provider
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: public
      client_id: docintel
      redirect_uris:
        - matching_mode: strict
          url: "http://localhost:3001/auth/callback"
        - matching_mode: strict
          url: "http://localhost:8080/login/oauth2/code/authentik"
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-tenant]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-role]]

  # ============================================================================
  # 3. Application
  # ============================================================================
  - model: authentik_core.application
    id: docintel-app
    identifiers:
      slug: docintel
    attrs:
      name: DocIntel
      slug: docintel
      provider: !KeyOf docintel-provider
      icon: "http://localhost:3001/logos/docintel_logo.png"
      meta_launch_url: "http://localhost:3001"
      meta_description: "DocIntel - Enterprise Document Intelligence"
      policy_engine_mode: any

  # ============================================================================
  # 4. Branding
  # ============================================================================
  - model: authentik_brands.brand
    identifiers:
      domain: authentik-default
    attrs:
      branding_title: DocIntel
      branding_logo: "/static/dist/custom/logo.png"
      branding_favicon: "/static/dist/custom/favicon.png"
      branding_custom_css: |
        /* Hide footer and language selector */
        .pf-c-login__footer, [slot="footer"] { display: none !important; }
        .pf-c-login__header [slot="above"] { display: none !important; }

        /* Background: gradient matching DocIntel theme */
        .pf-c-login { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%) !important; }
        .pf-c-login::before { display: none !important; }

        /* Login card styling */
        .pf-c-login__main {
          border-radius: 16px !important;
          box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4) !important;
          backdrop-filter: blur(20px) !important;
          background: rgba(30, 41, 59, 0.95) !important;
          border: 1px solid rgba(99, 102, 241, 0.15) !important;
          max-width: 420px !important;
        }

        /* Logo sizing */
        .pf-c-login__main-header .pf-c-brand { max-height: 64px !important; }

        /* Input fields */
        .pf-c-form-control {
          border-radius: 8px !important;
          background: rgba(15, 23, 42, 0.6) !important;
          border: 1px solid rgba(99, 102, 241, 0.3) !important;
          color: #e2e8f0 !important;
          padding: 10px 14px !important;
        }
        .pf-c-form-control:focus {
          border-color: #6366f1 !important;
          box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25) !important;
        }

        /* Login button */
        .pf-c-button.pf-m-primary {
          border-radius: 8px !important;
          background: linear-gradient(135deg, #6366f1, #4f46e5) !important;
          border: none !important;
          padding: 10px 20px !important;
          font-weight: 600 !important;
          letter-spacing: 0.025em !important;
          transition: all 0.2s ease !important;
        }
        .pf-c-button.pf-m-primary:hover {
          background: linear-gradient(135deg, #818cf8, #6366f1) !important;
          box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4) !important;
        }

        /* Title text */
        .pf-c-login__main-header-desc { color: #94a3b8 !important; }
        .pf-c-title { color: #f1f5f9 !important; }

        /* Labels */
        .pf-c-form__label-text { color: #cbd5e1 !important; }

  # Update default auth flow: title + stacked centered layout
  - model: authentik_flows.flow
    identifiers:
      slug: default-authentication-flow
    attrs:
      title: "Sign in to DocIntel"
      layout: stacked

  # Combine username + password on single page
  - model: authentik_stages_identification.identificationstage
    identifiers:
      name: default-authentication-identification
    attrs:
      user_fields:
        - email
        - username
      password_stage: !Find [authentik_stages_password.passwordstage, [name, default-authentication-password]]

  # ============================================================================
  # 5. Groups
  # ============================================================================

  # Platform admin group — cross-tenant, role: platform_admin
  - model: authentik_core.group
    id: platform-admin-group
    identifiers:
      name: platform-admin
    attrs:
      name: platform-admin
      attributes:
        role: platform_admin

  # Alpha tenant — admin group
  - model: authentik_core.group
    id: alpha-tenant-admin-group
    identifiers:
      name: alpha-tenant-admin
    attrs:
      name: alpha-tenant-admin
      attributes:
        tenant_id: alpha
        role: tenant_admin

  # Alpha tenant — user group
  - model: authentik_core.group
    id: alpha-tenant-group
    identifiers:
      name: alpha-tenant
    attrs:
      name: alpha-tenant
      attributes:
        tenant_id: alpha
        role: tenant_user

  # Beta tenant — admin group
  - model: authentik_core.group
    id: beta-tenant-admin-group
    identifiers:
      name: beta-tenant-admin
    attrs:
      name: beta-tenant-admin
      attributes:
        tenant_id: beta
        role: tenant_admin

  # Beta tenant — user group
  - model: authentik_core.group
    id: beta-tenant-group
    identifiers:
      name: beta-tenant
    attrs:
      name: beta-tenant
      attributes:
        tenant_id: beta
        role: tenant_user

  # ============================================================================
  # 6. Users
  # ============================================================================

  # Platform admin
  - model: authentik_core.user
    id: diadmin
    identifiers:
      username: diadmin
    attrs:
      username: diadmin
      name: DocIntel Admin
      email: diadmin@docintel.local
      password: "Diadmin@123"
      path: users
      is_active: true
      groups:
        - !KeyOf platform-admin-group

  # Alpha tenant admin
  - model: authentik_core.user
    id: alphaadmin
    identifiers:
      username: alphaadmin
    attrs:
      username: alphaadmin
      name: Alpha Admin
      email: alphaadmin@alpha.local
      password: "Alphaadmin@123"
      path: users
      is_active: true
      groups:
        - !KeyOf alpha-tenant-admin-group

  # Alpha tenant user
  - model: authentik_core.user
    id: alphauser
    identifiers:
      username: alphauser
    attrs:
      username: alphauser
      name: Alpha User
      email: alphauser@alpha.local
      password: "Alphauser@123"
      path: users
      is_active: true
      groups:
        - !KeyOf alpha-tenant-group

  # Beta tenant admin
  - model: authentik_core.user
    id: betaadmin
    identifiers:
      username: betaadmin
    attrs:
      username: betaadmin
      name: Beta Admin
      email: betaadmin@beta.local
      password: "Betaadmin@123"
      path: users
      is_active: true
      groups:
        - !KeyOf beta-tenant-admin-group

  # Beta tenant user
  - model: authentik_core.user
    id: betauser
    identifiers:
      username: betauser
    attrs:
      username: betauser
      name: Beta User
      email: betauser@beta.local
      password: "Betauser@123"
      path: users
      is_active: true
      groups:
        - !KeyOf beta-tenant-group

  # Note: akadmin (Authentik superuser) is automatically added to the
  # platform-admin group by setup-authentik.sh via the add_user API call.

# DocIntel - Enterprise Document Intelligence
# ============================================
# All images pinned to specific stable versions - never use :latest
#
# Prerequisites:
#   - Native Ollama installed and running (ollama.ai)
#   - Run ./scripts/setup.sh for first-time setup
#
# Usage:
#   Full stack (default):       docker compose up -d
#
# Auth is always-on. Zitadel (AGPL v3.0) is a core service that starts with the stack.

services:
  # ============================================================================
  # Application Services
  # ============================================================================
  
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./config/zitadel/generated.env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DOCUMENT_SERVICE_URL=http://document-service:8081
      - RAG_SERVICE_URL=http://rag-service:8000
      - INGESTION_SERVICE_URL=http://ingestion-service:8001
      - DATA_LOADER_URL=http://data-loader:8002
      - ADMIN_SERVICE_URL=http://admin-service:8082
      - ANALYTICS_SERVICE_URL=http://analytics-service:8001
      - ZITADEL_ISSUER_URI=http://localhost:9095
      - ZITADEL_JWK_SET_URI=http://zitadel-oidc/oauth/v2/keys
      - ZITADEL_DOMAIN=localhost
      - OPA_URL=http://opa:8181
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3001}
      - INTERNAL_GATEWAY_SECRET=${INTERNAL_GATEWAY_SECRET:-}
    depends_on:
      redis:
        condition: service_healthy
      document-service:
        condition: service_started
      rag-service:
        condition: service_healthy
      ingestion-service:
        condition: service_started
      data-loader:
        condition: service_started
      analytics-service:
        condition: service_started
      opa:
        condition: service_started
      zitadel-proxy:
        condition: service_started
    networks:
      - docintel-network

  document-service:
    build: ./services/document-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/docintel?user=docintel_documents&password=${DOCINTEL_DOCUMENTS_DB_PASSWORD}
      - SPRING_DATASOURCE_USERNAME=docintel_documents
      - SPRING_DATASOURCE_PASSWORD=${DOCINTEL_DOCUMENTS_DB_PASSWORD}
      # DDL user (superuser) — used by Flyway to create documents.flyway_schema_history
      - FLYWAY_DDL_USERNAME=docintel
      - FLYWAY_DDL_PASSWORD=${POSTGRES_PASSWORD}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - RAG_SERVICE_URL=http://rag-service:8000
      - INGESTION_SERVICE_URL=http://ingestion-service:8001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - INTERNAL_GATEWAY_SECRET=${INTERNAL_GATEWAY_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_healthy
      ingestion-service:
        condition: service_started
    networks:
      - docintel-network

  rag-service:
    build:
      context: .
      dockerfile: services/rag-service/Dockerfile
      args:
        TORCH_INDEX: ${TORCH_INDEX:-https://download.pytorch.org/whl/cpu}
        TORCH_VERSION: ${TORCH_VERSION:-2.11.0+cpu}
    image: docintel-rag-service:${PROFILE_TAG:-cpu}
    pull_policy: never
    environment:
      - QDRANT_URL=http://qdrant:6333
      # LLM Engine — OpenAI-compatible chat completions endpoint.
      # Switch engine by overriding LLM_CHAT_URL in .env:
      #   LMForge  (macOS/Apple Silicon): http://host.docker.internal:11430/v1
      #   Ollama   (any platform, default): http://host.docker.internal:11434/v1
      #   vLLM     (Linux/NVIDIA): http://host.docker.internal:8000/v1
      #   LM Studio (Windows/macOS): http://host.docker.internal:1234/v1
      - LLM_CHAT_URL=${LLM_CHAT_URL:-http://host.docker.internal:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen3.5:4b}
      - LLM_FALLBACK_MODEL=${LLM_FALLBACK_MODEL:-phi3:mini}
      - LLM_API_KEY=${LLM_API_KEY:-none}
      - LLM_EXPANSION_MODEL=${LLM_EXPANSION_MODEL:-qwen3:1.7b}
      # Embeddings — same engine as chat by default; override LLM_EMBED_URL to switch
      #   LMForge (macOS/Apple Silicon): http://host.docker.internal:11430/v1  [default]
      #   Ollama   (any platform):       http://host.docker.internal:11434/v1
      #   vLLM     (Linux/NVIDIA):       http://host.docker.internal:8000/v1
      - LLM_EMBED_URL=${LLM_EMBED_URL:-http://host.docker.internal:11430/v1}
      - LLM_EMBED_MODEL=${LLM_EMBED_MODEL:-qwen3-embed:0.6b:8bit}
      - LLM_EMBED_DIM=1024
      # Sampling parameters — global env-level fallbacks (lowest priority in resolution chain).
      # Override in .env to change the baseline for all models without a DB profile.
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.1}
      - LLM_TOP_P=${LLM_TOP_P:-}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-1024}
      - LLM_FREQUENCY_PENALTY=${LLM_FREQUENCY_PENALTY:-0.3}
      - LLM_THINKING_TEMPERATURE=${LLM_THINKING_TEMPERATURE:-0.6}
      - LLM_THINKING_TOP_P=${LLM_THINKING_TOP_P:-0.95}
      - LLM_THINKING_MAX_TOKENS=${LLM_THINKING_MAX_TOKENS:-8192}
      # Reranker — LMForge /v1/rerank (replaces Infinity sidecar)
      # Disabled until an MLX-format reranker is added to the LMForge catalog.
      # Re-enable by setting USE_RERANKING=true once a compatible model is pulled.
      - RERANKER_MODEL=${LLM_RERANK_MODEL:-jina-reranker-v2:multilingual}
      - RERANKER_URL=${LLM_RERANK_URL:-http://host.docker.internal:11430/v1}
      - USE_RERANKING=${USE_RERANKING:-false}
      # RAG Pipeline Configuration
      - RAG_RETRIEVER_TOP_K=50
      - RAG_RERANKER_TOP_K=10
      - RAG_DEFAULT_TOP_K=5
      # Domain router — rag-service reads RAG_DOMAIN_ROUTER_MODEL (field: rag_domain_router_model)
      - RAG_USE_DOMAIN_ROUTING=${RAG_USE_DOMAIN_ROUTING:-true}
      - RAG_DOMAIN_ROUTER_MODEL=${DEFAULT_DOMAIN_CLASSIFIER_MODEL:-MoritzLaurer/deberta-v3-base-zeroshot-v1.1-all-33}
      # Document Service (for sample dataset record creation)
      - DOCUMENT_SERVICE_URL=http://document-service:8081
      - ANALYTICS_SERVICE_URL=http://analytics-service:8001
      # Observability (matches Langfuse auto-provisioned keys)
      - LANGFUSE_HOST=http://langfuse-web:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      # Disable Haystack's outbound telemetry ping (also avoids ~/.config write at startup)
      - HAYSTACK_TELEMETRY_ENABLED=false
      - POSTGRES_URL=postgresql://docintel_rag:${DOCINTEL_RAG_DB_PASSWORD}@postgres:5432/docintel
      - OPA_URL=http://opa:8181
      - INTERNAL_GATEWAY_SECRET=${INTERNAL_GATEWAY_SECRET:-}
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - docintel-network
    # Allow container to reach host's LMForge/Ollama/vLLM (works on macOS by default, needed for Linux)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - huggingface-cache:/opt/hf-cache
    deploy:
      resources:
        reservations:
          memory: 4G

  data-loader:
    build:
      context: .
      dockerfile: services/data-loader/Dockerfile
      args:
        TORCH_INDEX: ${TORCH_INDEX:-https://download.pytorch.org/whl/cpu}
        TORCH_VERSION: ${TORCH_VERSION:-2.11.0+cpu}
    image: docintel-data-loader:${PROFILE_TAG:-cpu}
    pull_policy: never
    environment:
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - DOCUMENT_SERVICE_URL=http://document-service:8081
      - INTERNAL_GATEWAY_SECRET=${INTERNAL_GATEWAY_SECRET:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      document-service:
        condition: service_started
    volumes:
      - huggingface-cache:/opt/hf-cache
    networks:
      - docintel-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          memory: 2G

  ingestion-service:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
      args:
        TORCH_INDEX: ${TORCH_INDEX:-https://download.pytorch.org/whl/cpu}
        TORCH_VERSION: ${TORCH_VERSION:-2.11.0+cpu}
    image: docintel-ingestion-service:${PROFILE_TAG:-cpu}
    pull_policy: never
    environment:
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - QDRANT_URL=http://qdrant:6333
      # Embeddings via OpenAI-compatible endpoint (LMForge by default)
      - LLM_EMBED_URL=${LLM_EMBED_URL:-http://host.docker.internal:11430/v1}
      - LLM_EMBED_MODEL=${LLM_EMBED_MODEL:-qwen3-embed:0.6b:8bit}
      - LLM_API_KEY=${LLM_API_KEY:-none}
      - DOCUMENT_SERVICE_URL=http://document-service:8081
      - DOCLING_ARTIFACTS_PATH=/app/docling-cache
      - DOCLING_DO_OCR=${DOCLING_DO_OCR:-false}
      - DOCLING_DO_TABLE_STRUCTURE=${DOCLING_DO_TABLE_STRUCTURE:-true}
      - DOCLING_MAX_WORKERS=${DOCLING_MAX_WORKERS:-2}
      - DOCLING_SHARD_PAGES=${DOCLING_SHARD_PAGES:-25}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-32}
      - INGESTION_REST_ENABLED=false
      # VLM escalation (page routing Phase 2/3)
      - LLM_VLM_URL=${LLM_VLM_URL:-http://host.docker.internal:11430/v1}
      - LLM_VLM_MODEL=${LLM_VLM_MODEL:-qwen2.5-vl:3b:4bit}
      - VLM_MAX_CONCURRENCY=${VLM_MAX_CONCURRENCY:-2}
      - VLM_RENDER_DPI=${VLM_RENDER_DPI:-150}
      - INGESTION_USE_PAGE_ROUTING=${INGESTION_USE_PAGE_ROUTING:-false}
      - HAYSTACK_TELEMETRY_ENABLED=false
      # DOMAIN_CLASSIFIER_MODEL is consumed by docintel-common inside the container image
      - INTERNAL_GATEWAY_SECRET=${INTERNAL_GATEWAY_SECRET:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - STREAM_CONSUMER_ENABLED=true
      # Read-only PG access for ModelProfileResolver (VLM sampling params)
      - POSTGRES_URL=postgresql://docintel_documents:${DOCINTEL_DOCUMENTS_DB_PASSWORD}@postgres:5432/docintel
    depends_on:
      qdrant:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      # NOTE: docling-cache used to be a named volume mounted at /app/docling-cache,
      # but that shadowed the layout/tableformer/easyocr models baked into the image.
      # The image is now self-contained — no volume needed for docling artifacts.
      - huggingface-cache:/opt/hf-cache
    networks:
      - docintel-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          memory: 4G

  analytics-service:
    build: ./services/analytics-service-py
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DATABASE=docintel_analytics
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3001}
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - docintel-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  admin-service:
    build: ./services/admin-service
    env_file:
      - ./config/defaults.env
      - ./config/zitadel/generated.env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/docintel?user=docintel_admin&password=${DOCINTEL_ADMIN_DB_PASSWORD}
      - SPRING_DATASOURCE_USERNAME=docintel_admin
      - SPRING_DATASOURCE_PASSWORD=${DOCINTEL_ADMIN_DB_PASSWORD}
      # DDL user (superuser) — used by Flyway to create the admin.flyway_schema_history table
      - FLYWAY_DDL_USERNAME=docintel
      - FLYWAY_DDL_PASSWORD=${POSTGRES_PASSWORD}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - ZITADEL_URL=http://zitadel-oidc
      # ZITADEL_SERVICE_ACCOUNT_PAT and ZITADEL_PROJECT_ID injected via generated.env (env_file above)
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - DOCUMENT_SERVICE_URL=http://document-service:8081
      - RAG_SERVICE_URL=http://rag-service:8000
      - ANALYTICS_SERVICE_URL=http://analytics-service:8001
      - INTERNAL_GATEWAY_SECRET=${INTERNAL_GATEWAY_SECRET:-}
      # Active model ids — surfaced by GET /internal/active-models for the UI's
      # "Active Models" panel. Source of truth is the deployment env (these
      # mirror the values passed to rag-service / ingestion-service above).
      - LLM_MODEL=${LLM_MODEL:-qwen3.5:4b}
      - LLM_VLM_MODEL=${LLM_VLM_MODEL:-qwen2.5-vl:3b:4bit}
      - LLM_EMBED_MODEL=${LLM_EMBED_MODEL:-qwen3-embed:0.6b:8bit}
      - LLM_RERANK_MODEL=${LLM_RERANK_MODEL:-jina-reranker-v2:multilingual}
      - USE_RERANKING=${USE_RERANKING:-false}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      zitadel-proxy:
        condition: service_healthy
    networks:
      - docintel-network

  # Web UI - Static SPA served by nginx
  web-ui:
    build: ./services/web-ui
    ports:
      - "3001:3001"
    env_file:
      - ./config/zitadel/generated.env
    environment:
      # ZITADEL_CLIENT_ID injected via generated.env (env_file above)
      - PUBLIC_API_URL=http://localhost:8080
      - PUBLIC_ZITADEL_ISSUER=http://localhost:9095
    depends_on:
      zitadel-proxy:
        condition: service_healthy
      api-gateway:
        condition: service_started
    networks:
      - docintel-network
    deploy:
      resources:
        limits:
          memory: 64M

  # ============================================================================
  # Policy Engine (OPA — Open Policy Agent)
  # ============================================================================
  # Internal only — not exposed on host; only api-gateway reaches it
  opa:
    image: openpolicyagent/opa:0.70.0-static
    command: ["run", "--server", "--addr=0.0.0.0:8181", "--log-level=info", "--watch", "/policies"]
    volumes:
      - ./config/opa/policies:/policies:ro
    networks:
      - docintel-network
    deploy:
      resources:
        limits:
          memory: 64M

  # ============================================================================
  # Connection Pooler — PgBouncer removed
  # ============================================================================
  # PgBouncer in transaction-pool mode is incompatible with session-level SET
  # statements used for PostgreSQL RLS (app.current_tenant / app.user_role).
  # All services connect directly to PostgreSQL via HikariCP (Kotlin) or
  # SQLAlchemy (Python), which provide adequate connection pooling for current
  # scale. Re-introduce PgBouncer in session-pool mode or upgrade to
  # Supavisor/pgcat when horizontal scaling demands it.

  # ============================================================================
  # Data Layer (pinned versions - never use :latest)
  # ============================================================================

  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports:
      - "6333:6333"
      # gRPC port (6334) not exposed — only HTTP REST (6333) is accessed from host (backup.sh, scripts)
    volumes:
      - qdrant-data:/qdrant/storage
      - ./config/qdrant:/qdrant/config:ro
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - docintel-network
    deploy:
      resources:
        limits:
          memory: 1G

  postgres:
    image: postgres:18.1-trixie
    # No host port binding — all services connect via Docker internal network (postgres:5432).
    # To access from host: docker exec -it docintel-postgres-1 psql -U docintel docintel
    environment:
      - POSTGRES_DB=docintel
      - POSTGRES_USER=docintel
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DOCINTEL_APP_DB_PASSWORD=${DOCINTEL_APP_DB_PASSWORD}
      - DOCINTEL_ADMIN_DB_PASSWORD=${DOCINTEL_ADMIN_DB_PASSWORD}
      - DOCINTEL_DOCUMENTS_DB_PASSWORD=${DOCINTEL_DOCUMENTS_DB_PASSWORD}
      - DOCINTEL_RAG_DB_PASSWORD=${DOCINTEL_RAG_DB_PASSWORD}
    volumes:
      # PostgreSQL 18+ uses version-specific subdirectories under /var/lib/postgresql
      - postgres-data:/var/lib/postgresql
      - ./config/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docintel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docintel-network
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7.4.0-alpine
    volumes:
      - redis-data:/data
    command: >
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 200mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - docintel-network
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    # No host ports in base config — all services reach MinIO via internal Docker
    # network (minio:9000). Host ports for dev tooling live in docker-compose.override.yml.
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
    volumes:
      - minio-data:/data
    command: server /data --address ":9000" --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - docintel-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================================
  # AI Infrastructure
  # ============================================================================
  # NOTE: Ollama runs NATIVELY on the host (not in Docker) for best performance
  # - M1/M2/M3 Macs: Uses Metal GPU acceleration via native Ollama
  # - NVIDIA GPUs:   Uses CUDA via native Ollama
  #
  # Install Ollama: https://ollama.ai/download
  # Setup script handles model downloads: ./scripts/setup.sh
  # ============================================================================

  # ============================================================================
  # Observability (Langfuse v3 with ClickHouse)
  # ============================================================================
  # Based on official Langfuse docker-compose:
  # https://github.com/langfuse/langfuse/blob/main/docker-compose.yml

  clickhouse:
    image: clickhouse/clickhouse-server:25.1.3.23
    restart: always
    user: "101:101"
    # No host ports — langfuse/analytics connect via internal network (clickhouse:8123, clickhouse:9000)
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: "${CLICKHOUSE_USER}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-clickhouse} --password ${CLICKHOUSE_PASSWORD:-clickhouse} --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - docintel-network
    deploy:
      resources:
        limits:
          memory: 1G

  # Langfuse Worker - processes background jobs
  # Using :3 tag as recommended by Langfuse (rolling v3.x updates)
  langfuse-worker:
    image: langfuse/langfuse-worker@sha256:867e0c6c5b894288dd2e7a0f41399d6386a490761578bece97ab92df2cec40a0
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    environment: &langfuse-env
      # Database
      DATABASE_URL: postgresql://docintel:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      # ClickHouse (single-node mode)
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_USER: "${CLICKHOUSE_USER}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: "${REDIS_PASSWORD}"
      # S3/MinIO for blob storage
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: "${MINIO_ACCESS_KEY}"
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: "${MINIO_SECRET_KEY}"
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: "${MINIO_ACCESS_KEY}"
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: "${MINIO_SECRET_KEY}"
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      # Auth & Security
      SALT: "${LANGFUSE_SALT}"
      ENCRYPTION_KEY: "${LANGFUSE_ENCRYPTION_KEY}"
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
    networks:
      - docintel-network

  # Langfuse Web - UI and API
  # Using :3 tag as recommended by Langfuse (rolling v3.x updates)
  langfuse-web:
    image: langfuse/langfuse:3
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # Langfuse v3 web needs >1G during fresh init (DB + ClickHouse
          # migrations + headless org/project/user provisioning), where it OOM'd
          # the Node heap. 2G clears startup; it settles well below this after.
          memory: 2G
    environment:
      <<: *langfuse-env
      # Let the Node heap use the larger container budget (default cap OOM'd).
      NODE_OPTIONS: "--max-old-space-size=1536"
      NEXTAUTH_SECRET: "${LANGFUSE_NEXTAUTH_SECRET}"
      # Auto-provisioned user for local development
      # See: https://langfuse.com/self-hosting/administration/headless-initialization
      LANGFUSE_INIT_ORG_ID: docintel-org
      LANGFUSE_INIT_ORG_NAME: DocIntel
      LANGFUSE_INIT_PROJECT_ID: docintel-project
      LANGFUSE_INIT_PROJECT_NAME: DocIntel RAG
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY}"
      LANGFUSE_INIT_PROJECT_SECRET_KEY: "${LANGFUSE_SECRET_KEY}"
      LANGFUSE_INIT_USER_EMAIL: admin@docintel.local
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: "${LANGFUSE_INIT_USER_PASSWORD}"
    networks:
      - docintel-network

  # ============================================================================
  # Identity Provider (Zitadel - AGPL v3.0, self-hosted, no modification)
  # ============================================================================
  # Zitadel UI:  http://localhost:9095
  # First-time setup: terraform/stacks/identity/ (run automatically by start.sh)
  #
  # Three-container setup (mirrors official Zitadel deploy/compose):
  #   zitadel-proxy  — Traefik routes /ui/v2/login* → zitadel-login, rest → zitadel-api
  #   zitadel-api    — Go binary: OIDC/OAuth2 server + management REST API
  #   zitadel-login  — Next.js login UI (Login v2)

  # Lightweight nginx that rewrites Host: localhost before forwarding to zitadel-api:8080.
  # Needed because Zitadel validates the Host header against its external domain (localhost),
  # but Reactor Netty cannot override the Host header from inside Spring WebClient.
  zitadel-oidc:
    image: nginx:alpine
    volumes:
      - ./config/nginx/zitadel-oidc.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - docintel-network
    depends_on:
      - zitadel-api
    deploy:
      resources:
        limits:
          memory: 16M

  zitadel-proxy:
    image: traefik:v3.6.8
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=docintel-network
      - --entrypoints.web.address=:80
      - --ping=true
      - --ping.entrypoint=web
    ports:
      - "9095:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      zitadel-api:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - docintel-network
    deploy:
      resources:
        limits:
          memory: 64M

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:v4.12.1
    command: >
      start-from-init
      --masterkey "${ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}"
      --config /zitadel/config/system-api.yaml
    environment:
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: "9095"
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"

      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: docintel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: "${POSTGRES_PASSWORD}"
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel_app
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD:-zitadel_app_secret}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable

      # Bootstrap: admin machine account + PAT — used by start.sh for Actions v2 setup
      # (feature enable + target registration + execution assignment) which requires
      # instance-admin scope not available through the Zitadel TF provider natively.
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: docintel-setup
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: DocIntel Setup Account
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/admin.pat
      # Zitadel admin UI human account (for console access at localhost:9095)
      ZITADEL_FIRSTINSTANCE_ORG_NAME: DocIntel
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME:-zitadel-admin}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:-DocIntel@zitadel2024!}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Login Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"

      # Login v2 (required for zitadel-login Next.js UI)
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: http://localhost:9095/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: http://localhost:9095/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: http://localhost:9095/ui/v2/login/logout?post_logout_redirect=

      # Actions v2: clear deny list so internal Docker hostnames can be action targets
      ZITADEL_ACTIONS_HTTP_DENYLIST: ""

      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: "true"
      ZITADEL_INSTRUMENTATION_TRACE_EXPORTER_TYPE: "none"
    volumes:
      - ./config/zitadel/bootstrap:/zitadel/bootstrap:rw
      - ./config/zitadel/system-api.yaml:/zitadel/config/system-api.yaml:ro
      - ./config/zitadel/system-api-public.pem:/zitadel/config/system-api-public.pem:ro
    ports:
      - "9096:8080"
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - docintel-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=docintel-network
      - traefik.http.services.zitadel-api.loadbalancer.server.port=8080
      - traefik.http.services.zitadel-api.loadbalancer.server.scheme=h2c
      - "traefik.http.routers.zitadel-api.rule=Host(`localhost`) && !PathPrefix(`/ui/v2/login`) && !Path(`/`)"
      - traefik.http.routers.zitadel-api.entrypoints=web
      - traefik.http.routers.zitadel-api.service=zitadel-api
      - traefik.http.routers.zitadel-api.priority=100
    deploy:
      resources:
        limits:
          memory: 512M

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.12.1
    environment:
      ZITADEL_API_URL: http://zitadel-api:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: "Host:localhost,X-Forwarded-Proto:http"
      LOGIN_OTEL_SERVICE_NAME: zitadel-login
      LOGIN_OTEL_EXPORTER_OTLP_ENDPOINT: ""
      LOGIN_OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    volumes:
      - ./config/zitadel/bootstrap:/zitadel/bootstrap:ro
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    depends_on:
      zitadel-api:
        condition: service_healthy
    networks:
      - docintel-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=docintel-network
      - traefik.http.services.zitadel-login.loadbalancer.server.port=3000
      - traefik.http.middlewares.zitadel-root-rewrite.replacepath.path=/ui/v2/login/
      - "traefik.http.routers.zitadel-root.rule=Host(`localhost`) && Path(`/`)"
      - traefik.http.routers.zitadel-root.entrypoints=web
      - traefik.http.routers.zitadel-root.middlewares=zitadel-root-rewrite
      - traefik.http.routers.zitadel-root.service=zitadel-login
      - traefik.http.routers.zitadel-root.priority=400
      - "traefik.http.routers.zitadel-login.rule=Host(`localhost`) && PathPrefix(`/ui/v2/login`)"
      - traefik.http.routers.zitadel-login.entrypoints=web
      - traefik.http.routers.zitadel-login.service=zitadel-login
      - traefik.http.routers.zitadel-login.priority=250
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================================
  # Zitadel Actions v2 — custom claims webhook
  # Signing key is written to config/zitadel/generated.env by start.sh after
  # terraform apply; container is restarted to pick it up.
  # ============================================================================
  docintel-actions:
    build:
      context: ./config/zitadel/actions-v2
      dockerfile: Dockerfile
    env_file:
      - ./config/zitadel/generated.env
    environment:
      - PORT=8090
      - ZITADEL_URL=http://zitadel-proxy
      - ZITADEL_HOST=localhost
      - ZITADEL_DOMAIN=localhost
    depends_on:
      zitadel-proxy:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - docintel-network
    deploy:
      resources:
        limits:
          memory: 64M

  # ============================================================================
  # Observability — Exporters (expose infra metrics to Prometheus)
  # ============================================================================
  # Redis has no native Prometheus endpoint — needs a sidecar exporter
  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0-alpine
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - docintel-network
    deploy:
      resources:
        limits:
          memory: 32M

  # PostgreSQL has no native Prometheus endpoint — needs a sidecar exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      - DATA_SOURCE_NAME=postgresql://docintel:${POSTGRES_PASSWORD}@postgres:5432/docintel?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - docintel-network
    deploy:
      resources:
        limits:
          memory: 32M

  # ============================================================================
  # Observability — Prometheus (scraper) + Grafana (dashboards)
  # ============================================================================
  # Flow: services expose /metrics → Prometheus scrapes every 15s → Grafana queries Prometheus
  # Grafana UI:    http://localhost:3002  (admin / admin)
  # Prometheus UI: http://localhost:9091  (raw PromQL — for debugging only)
  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - docintel-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/00-overview.json
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - docintel-network
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  docintel-network:
    driver: bridge

volumes:
  qdrant-data:
  postgres-data:
  redis-data:
  minio-data:
  clickhouse-data:
  clickhouse-logs:
  huggingface-cache:
  prometheus-data:
  grafana-data:
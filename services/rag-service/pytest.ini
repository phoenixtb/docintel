[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require Qdrant, may be slow)
    slow: Slow tests (deselect with -m "not slow")
    e2e: End-to-end tests

# Default options
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Async mode for pytest-asyncio
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeouts (requires pytest-timeout)
timeout = 300

# Coverage (requires pytest-cov)
# Run with: pytest --cov=src --cov-report=html

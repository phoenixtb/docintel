server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml text/javascript;

    # SPA fallback — all routes resolve to index.html so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable assets forever (Vite outputs content-hashed filenames)
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache env-config.js — it is rewritten at each container start
    location = /env-config.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DocIntel - Document Intelligence</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicons/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/favicons/apple-touch-icon.png" />
    
    <!-- PWA / Android -->
    <link rel="icon" type="image/png" sizes="192x192" href="%sveltekit.assets%/favicons/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%sveltekit.assets%/favicons/android-chrome-512x512.png" />
    
    <!-- Theme color -->
    <meta name="theme-color" content="#070d14" />

    <!-- Apply saved theme before first paint to prevent flash.
         Falls back to dark if no preference is stored. -->
    <script>
      /* Dark is always the default. Only an explicit saved 'light' overrides. */
      if (localStorage.getItem('theme') !== 'light') {
        document.documentElement.classList.add('dark');
      }
    </script>
    
    <!-- Runtime env vars injected by docker-entrypoint.sh at container start -->
    <script src="/env-config.js"></script>
    %sveltekit.head%
  </head>
  <body>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>

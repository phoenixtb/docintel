spring.application.name=analytics-service
server.port=8001

# ClickHouse DataSource — connects to 'default' db; schema init creates docintel_analytics
spring.datasource.url=jdbc:clickhouse://${CLICKHOUSE_HOST:localhost}:${CLICKHOUSE_PORT:8123}/default
spring.datasource.username=${CLICKHOUSE_USER:default}
spring.datasource.password=${CLICKHOUSE_PASSWORD:}
spring.datasource.driver-class-name=com.clickhouse.jdbc.ClickHouseDriver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# Custom app properties
app.analytics.database=${CLICKHOUSE_DATABASE:docintel_analytics}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.io.foxbird=INFO

spring:
  application:
    name: document-service

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docint}
    username: ${SPRING_DATASOURCE_USERNAME:docint}
    password: ${SPRING_DATASOURCE_PASSWORD:docint_secret}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8081

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

messaging:
  streams:
    enabled: false   # disable stream consumers in local dev; use REST path

# MinIO Configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: documents

# RAG Service Configuration
rag-service:
  url: ${RAG_SERVICE_URL:http://localhost:8000}

qdrant:
  url: ${QDRANT_URL:http://localhost:6333}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

internal:
  gateway:
    secret: ${INTERNAL_GATEWAY_SECRET:}

# Logging
logging:
  level:
    com.docintel: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

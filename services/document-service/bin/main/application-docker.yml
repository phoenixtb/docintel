# Docker profile configuration
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/docintel?user=docintel_app&password=docintel_app_secret}
    username: ${SPRING_DATASOURCE_USERNAME:docintel_app}
    password: ${SPRING_DATASOURCE_PASSWORD:docintel_app_secret}

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    # Disabled — document-service manages Flyway programmatically in TenantDataSourceConfig
    # (targeting the documents schema so history is isolated from admin-service)
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

messaging:
  streams:
    enabled: true
    consumer-name: document-service-1

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}

rag-service:
  url: ${RAG_SERVICE_URL:http://rag-service:8000}

ingestion-service:
  url: ${INGESTION_SERVICE_URL:http://ingestion-service:8001}

internal:
  gateway:
    secret: ${INTERNAL_GATEWAY_SECRET:}

logging:
  level:
    com.docintel: INFO
    org.hibernate.SQL: WARN

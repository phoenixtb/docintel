spring:
  datasource:
    # Overridden at runtime by BaseIntegrationTest.Initializer with actual container values
    url: jdbc:postgresql://localhost:5432/testdb
    username: test
    password: test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  data:
    redis:
      # Overridden at runtime by BaseIntegrationTest.Initializer with actual container port
      host: localhost
      port: 6379

# MinIO test configuration (overridden by Testcontainers)
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: test-documents

# RAG Service mock URL
rag-service:
  url: http://localhost:8000

# Enable Redis Stream consumers in integration tests — wires against the Redis Testcontainer
messaging:
  streams:
    enabled: true
    consumer-name: document-service-test

logging:
  level:
    com.docintel: DEBUG
    org.hibernate.SQL: DEBUG
    org.testcontainers: INFO

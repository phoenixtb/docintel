# Docker profile configuration
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/docintel?user=docintel_app&password=docintel_app_secret}
    username: ${SPRING_DATASOURCE_USERNAME:docintel_app}
    password: ${SPRING_DATASOURCE_PASSWORD:docintel_app_secret}

  flyway:
    enabled: false  # configured programmatically in TenantDataSourceConfig

flyway:
  ddl:
    username: ${FLYWAY_DDL_USERNAME:${spring.datasource.username}}
    password: ${FLYWAY_DDL_PASSWORD:${spring.datasource.password}}

  data:
    redis:
      host: redis
      port: 6379

qdrant:
  url: http://qdrant:6333


zitadel:
  url: ${ZITADEL_URL:http://zitadel-api:8080}
  pat: ${ZITADEL_SERVICE_ACCOUNT_PAT:}
  project-id: ${ZITADEL_PROJECT_ID:}

document-service:
  url: ${DOCUMENT_SERVICE_URL:http://document-service:8081}

rag-service:
  url: ${RAG_SERVICE_URL:http://rag-service:8000}

analytics-service:
  url: ${ANALYTICS_SERVICE_URL:http://analytics-service:8001}

internal:
  gateway:
    secret: ${INTERNAL_GATEWAY_SECRET:}

docintel:
  default-llm-model: ${DEFAULT_LLM_MODEL:qwen3.5:4b}
  internal-gateway-secret: ${INTERNAL_GATEWAY_SECRET:}

logging:
  level:
    com.docintel: INFO

spring:
  datasource:
    # Overridden at runtime by BaseIntegrationTest via @DynamicPropertySource
    url: jdbc:postgresql://localhost:5432/testdb
    username: test
    password: test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: false  # disables both Spring auto-config and TenantDataSourceConfig Flyway bean

  data:
    redis:
      host: localhost
      port: 6379

flyway:
  ddl:
    username: test
    password: test

management:
  health:
    redis:
      enabled: false

analytics-service:
  url: http://localhost:9999  # unreachable in tests — mocked via @MockkBean

internal:
  gateway:
    secret: test-internal-secret

logging:
  level:
    com.docintel: DEBUG

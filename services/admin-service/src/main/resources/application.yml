spring:
  application:
    name: admin-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docint}
    username: ${SPRING_DATASOURCE_USERNAME:docint}
    password: ${SPRING_DATASOURCE_PASSWORD:docint_secret}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: false  # Managed programmatically in TenantDataSourceConfig

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8082

# Qdrant Configuration
qdrant:
  url: ${QDRANT_URL:http://localhost:6333}
  embedding-dim: 768


# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    redis:
      enabled: false

# Zitadel API for tenant/user management (AGPL v3.0 — self-hosted)
zitadel:
  url: ${ZITADEL_URL:http://localhost:9090}
  pat: ${ZITADEL_SERVICE_ACCOUNT_PAT:}
  project-id: ${ZITADEL_PROJECT_ID:}

# MinIO configuration for per-tenant bucket provisioning
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

# Logging
logging:
  level:
    com.docintel: DEBUG

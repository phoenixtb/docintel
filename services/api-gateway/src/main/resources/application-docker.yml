# Docker profile configuration
spring:
  data:
    redis:
      host: redis
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:redissecret}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ZITADEL_ISSUER_URI:http://localhost:9090}
          jwk-set-uri: ${ZITADEL_JWK_SET_URI:http://zitadel-oidc/oauth/v2/keys}
          audiences: ${ZITADEL_PROJECT_ID}

  cloud:
    gateway:
      # Global rate limiter: 100 req/s per tenant, burst 150
      default-filters:
        - name: RequestRateLimiter
          args:
            rate-limiter: "#{@defaultRedisRateLimiter}"
            key-resolver: "#{@tenantRateLimitKeyResolver}"

      routes:
        # document-service SSE stream — must be before the generic document-service route.
        # response-timeout=-1 prevents the gateway from closing the long-lived SSE connection.
        - id: document-service-events
          uri: http://document-service:8081
          predicates:
            - Path=/api/v1/documents/events
            - Method=GET
          filters:
            - RewritePath=/api/v1/documents/events, /internal/documents/events
          metadata:
            response-timeout: -1
            connect-timeout: 5000

        - id: document-service
          uri: http://document-service:8081
          predicates:
            - Path=/api/v1/documents, /api/v1/documents/**
          filters:
            - RewritePath=/api/v1/documents(?<segment>/?.*), /internal/documents${segment}

        # Cleanup job SSE stream — long-lived; must be before the generic document-service route.
        - id: document-service-cleanup-events
          uri: http://document-service:8081
          predicates:
            - Path=/api/v1/documents/cleanup/jobs/*/events
            - Method=GET
          filters:
            - RewritePath=/api/v1/documents/cleanup/jobs/(?<jobId>[^/]+)/events, /internal/documents/cleanup/jobs/${jobId}/events
          metadata:
            response-timeout: -1
            connect-timeout: 5000

        - id: document-service-cleanup
          uri: http://document-service:8081
          predicates:
            - Path=/api/v1/documents/cleanup, /api/v1/documents/cleanup/**
          filters:
            - RewritePath=/api/v1/documents/cleanup(?<segment>/?.*), /internal/documents/cleanup${segment}

        - id: document-service-delete-all
          uri: http://document-service:8081
          predicates:
            - Path=/api/v1/documents/all
            - Method=DELETE
          filters:
            - RewritePath=/api/v1/documents/all, /internal/documents/all

        - id: rag-service-settings-cache
          uri: http://rag-service:8000
          predicates:
            - Path=/api/v1/tenants/*/settings/invalidate-cache
            - Method=DELETE
          filters:
            - RewritePath=/api/v1/tenants/(?<tid>[^/]+)/settings/invalidate-cache, /internal/settings-cache/${tid}

        - id: user-preferences-cache
          uri: http://rag-service:8000
          predicates:
            - Path=/api/v1/users/me/preferences/invalidate-cache
            - Method=DELETE
          filters:
            - RewritePath=/api/v1/users/me/preferences/invalidate-cache, /internal/user-settings-cache

        - id: user-preferences
          uri: http://admin-service:8082
          predicates:
            - Path=/api/v1/users/me/preferences
            - Method=GET,PATCH
          filters:
            - RewritePath=/api/v1/users/me/preferences, /internal/users/me/preferences

        - id: rag-service-query
          uri: http://rag-service:8000
          predicates:
            - Path=/api/v1/query
          filters:
            - RewritePath=/api/v1/query, /query
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@queryRedisRateLimiter}"
                key-resolver: "#{@tenantRateLimitKeyResolver}"

        - id: rag-service-query-stream
          uri: http://rag-service:8000
          predicates:
            - Path=/api/v1/query/stream
          filters:
            - RewritePath=/api/v1/query/stream, /query/stream
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@queryRedisRateLimiter}"
                key-resolver: "#{@tenantRateLimitKeyResolver}"
          metadata:
            response-timeout: -1
            connect-timeout: 10000

        - id: ingestion-service-ingest
          uri: http://ingestion-service:8001
          predicates:
            - Path=/api/v1/ingest, /api/v1/ingest/**
          filters:
            - RewritePath=/api/v1/ingest(?<segment>/?.*), /ingest${segment}

        # data-loader: SSE progress stream — long-lived connection, no response timeout
        - id: data-loader-dataset-progress
          uri: ${DATA_LOADER_URL:http://data-loader:8002}
          predicates:
            - Path=/api/v1/datasets/load/*/progress
          filters:
            - RewritePath=/api/v1/datasets/load/(?<jobId>[^/]+)/progress, /datasets/load/${jobId}/progress
          metadata:
            response-timeout: -1   # -1 = unlimited (SSE stream)
            connect-timeout: 5000

        # data-loader: dataset list + bulk load trigger
        - id: data-loader-datasets
          uri: ${DATA_LOADER_URL:http://data-loader:8002}
          predicates:
            - Path=/api/v1/datasets, /api/v1/datasets/**
          filters:
            - RewritePath=/api/v1/datasets(?<segment>/?.*), /datasets${segment}

        - id: rag-service-conversations
          uri: http://rag-service:8000
          predicates:
            - Path=/api/v1/conversations, /api/v1/conversations/**
          filters:
            - RewritePath=/api/v1/conversations(?<segment>/?.*), /conversations${segment}

        - id: rag-service-vector-stats
          uri: http://rag-service:8000
          predicates:
            - Path=/api/v1/vector-stats
          filters:
            - RewritePath=/api/v1/vector-stats, /vector-stats

        - id: rag-service-models
          uri: http://rag-service:8000
          predicates:
            - Path=/api/v1/models
          filters:
            - RewritePath=/api/v1/models, /models

        - id: admin-service
          uri: http://admin-service:8082
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - RewritePath=/api/v1/admin/(?<segment>.*), /internal/${segment}

        - id: admin-tenants-settings
          uri: http://admin-service:8082
          predicates:
            - Path=/api/v1/tenants/*/settings
            - Method=GET,PATCH
          filters:
            - RewritePath=/api/v1/tenants/(?<tid>[^/]+)/settings, /internal/tenants/${tid}/settings

        - id: admin-tenants
          uri: http://admin-service:8082
          predicates:
            - Path=/api/v1/tenants, /api/v1/tenants/**
          filters:
            - RewritePath=/api/v1/tenants(?<segment>/?.*), /internal/tenants${segment}

        - id: analytics-service-feedback
          uri: http://analytics-service:8001
          predicates:
            - Path=/api/v1/feedback
          filters:
            - RewritePath=/api/v1/feedback, /events/feedback

        - id: analytics-service-analytics
          uri: http://analytics-service:8001
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - RewritePath=/api/v1/analytics/(?<segment>.*), /analytics/${segment}

# DocIntel gateway config
docintel:
  opa:
    url: ${OPA_URL:http://opa:8181}
logging:
  level:
    com.docintel: DEBUG
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Default route configuration
      routes:
        - id: document-service
          uri: ${DOCUMENT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/documents, /api/v1/documents/**
          filters:
            - RewritePath=/api/v1/documents(?<segment>/?.*), /internal/documents${segment}

        - id: rag-service-query
          uri: ${RAG_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/api/v1/query
          filters:
            - RewritePath=/api/v1/query, /query

        - id: rag-service-query-stream
          uri: ${RAG_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/api/v1/query/stream
          filters:
            - RewritePath=/api/v1/query/stream, /query/stream

        - id: ingestion-service-ingest
          uri: ${INGESTION_SERVICE_URL:http://localhost:8001}
          predicates:
            - Path=/api/v1/ingest, /api/v1/ingest/**
          filters:
            - RewritePath=/api/v1/ingest(?<segment>/?.*), /ingest${segment}

        - id: ingestion-service-sample-datasets
          uri: ${INGESTION_SERVICE_URL:http://localhost:8001}
          predicates:
            - Path=/api/v1/sample-datasets, /api/v1/sample-datasets/**
          filters:
            - RewritePath=/api/v1/sample-datasets(?<segment>/?.*), /ingest/dataset${segment}

        - id: rag-service-conversations
          uri: ${RAG_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/api/v1/conversations, /api/v1/conversations/**
          filters:
            - RewritePath=/api/v1/conversations(?<segment>/?.*), /conversations${segment}

        - id: rag-service-vector-stats
          uri: ${RAG_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/api/v1/vector-stats
          filters:
            - RewritePath=/api/v1/vector-stats, /vector-stats

        - id: analytics-service-feedback
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8001}
          predicates:
            - Path=/api/v1/feedback
          filters:
            - RewritePath=/api/v1/feedback, /events/feedback

        - id: analytics-service-analytics
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8001}
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - RewritePath=/api/v1/analytics/(?<segment>.*), /analytics/${segment}

        - id: admin-service
          uri: ${ADMIN_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - RewritePath=/api/v1/admin/(?<segment>.*), /internal/${segment}

        - id: admin-tenants
          uri: ${ADMIN_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/tenants, /api/v1/tenants/**
          filters:
            - RewritePath=/api/v1/tenants(?<segment>/?.*), /internal/tenants${segment}


docintel:
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:3001}"
  opa:
    url: "${OPA_URL:http://opa:8181}"

server:
  port: 8080

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    redis:
      enabled: false

resilience4j:
  circuitbreaker:
    instances:
      opa:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException

# Logging
logging:
  level:
    com.docintel: DEBUG
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
